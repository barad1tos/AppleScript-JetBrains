<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AppleScript Support</title>
  <desc id="desc">A neutral IDE-style AppleScript Support mark with AS lettering and a script prompt.</desc>
  <defs>
