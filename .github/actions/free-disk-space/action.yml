name: Free disk space
description: >
  Prune large pre-installed toolchains on GitHub-hosted Ubuntu runners so the
  Plugin Verifier has room to download and extract target IDE builds.

runs:
  using: composite
  steps:
    - name: Prune unused toolchains
      shell: bash
      run: |
        if [[ "${RUNNER_OS:-}" != "Linux" ]]; then
          echo "Skipping disk cleanup on ${RUNNER_OS:-unknown runner}"
          df -h /
          exit 0
        fi

        readonly paths_to_prune=(
          /opt/hostedtoolcache/CodeQL
          /usr/share/dotnet
          /usr/local/lib/android
          /opt/ghc
          /usr/local/share/boost
        )

        for path in "${paths_to_prune[@]}"; do
          if [[ -e "$path" ]]; then
            sudo rm -rf -- "$path"
          fi
        done

        df -h /
