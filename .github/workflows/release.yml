name: Release to Marketplace

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify plugin
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag is on main
        shell: bash
        run: |
          release_commit="$(git rev-parse HEAD)"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$release_commit" refs/remotes/origin/main; then
            echo "::error::Release tag ${GITHUB_REF_NAME} (${release_commit}) is not on origin/main"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true

      - name: Build plugin
        run: ./gradlew build -PskipHeavyTests=true --stacktrace

      - name: Run tests with coverage
        run: ./gradlew test koverXmlReport koverVerify --stacktrace

      - name: Run runIde headless smoke
        run: ./gradlew runIdeHeadlessSmoke --stacktrace

      - name: Verify plugin structure
        run: ./gradlew verifyPluginStructure --stacktrace

      - name: Verify plugin against target IDEs
        run: ./gradlew verifyPlugin --stacktrace

      - name: Verify bundled coroutines versions
        run: ./gradlew verifyBundledCoroutinesVersions --stacktrace

      - name: Verify docs metadata
        run: python3 scripts/verify-docs.py

      - name: Verify release helper scripts
        run: python3 scripts/tests/test_verify_plugin_verifier.py

      - name: Fail on unapproved verifier API findings
        run: python3 scripts/verify-plugin-verifier.py --fail-on-api-warnings

  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true

      - name: Materialize signing credentials
        shell: bash
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [[ -z "$PUBLISH_TOKEN" ]]; then
            echo "::error::Missing required release secret: JETBRAINS_MARKETPLACE_TOKEN"
            exit 1
          fi

          signing_secrets=0
          [[ -n "$CERTIFICATE_CHAIN" ]] && (( signing_secrets += 1 ))
          [[ -n "$PRIVATE_KEY" ]] && (( signing_secrets += 1 ))
          [[ -n "$PRIVATE_KEY_PASSWORD" ]] && (( signing_secrets += 1 ))

          if (( signing_secrets == 0 )); then
            echo "SIGN_PLUGIN=false" >> "$GITHUB_ENV"
            echo "::notice::Signing secrets are not configured; publishing unsigned plugin artifact."
            exit 0
          fi

          if (( signing_secrets != 3 )); then
            echo "::error::Signing secrets must be configured all together: CERTIFICATE_CHAIN PRIVATE_KEY PRIVATE_KEY_PASSWORD"
            exit 1
          fi

          printf '%s' "$CERTIFICATE_CHAIN" > "$RUNNER_TEMP/certificate-chain.crt"
          printf '%s' "$PRIVATE_KEY" > "$RUNNER_TEMP/private-key.pem"
          echo "CERTIFICATE_CHAIN_PATH=$RUNNER_TEMP/certificate-chain.crt" >> "$GITHUB_ENV"
          echo "PRIVATE_KEY_PATH=$RUNNER_TEMP/private-key.pem" >> "$GITHUB_ENV"
          echo "SIGN_PLUGIN=true" >> "$GITHUB_ENV"

      - name: Build, optionally sign, and publish
        shell: bash
        run: |
          if [[ "$SIGN_PLUGIN" == "true" ]]; then
            ./gradlew buildPlugin signPlugin publishPlugin --stacktrace
          else
            ./gradlew buildPlugin publishPlugin --stacktrace
          fi
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
          draft: false
