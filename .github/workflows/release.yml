name: Release to Marketplace

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify plugin
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true

      - name: Verify plugin
        run: ./gradlew verifyPlugin --stacktrace

      - name: Fail on internal API verifier findings
        run: python3 scripts/verify-plugin-verifier.py

  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true

      - name: Materialize signing credentials
        shell: bash
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          if [[ -n "$CERTIFICATE_CHAIN" && -n "$PRIVATE_KEY" ]]; then
            printf '%s' "$CERTIFICATE_CHAIN" > "$RUNNER_TEMP/certificate-chain.crt"
            printf '%s' "$PRIVATE_KEY" > "$RUNNER_TEMP/private-key.pem"
            echo "CERTIFICATE_CHAIN_PATH=$RUNNER_TEMP/certificate-chain.crt" >> "$GITHUB_ENV"
            echo "PRIVATE_KEY_PATH=$RUNNER_TEMP/private-key.pem" >> "$GITHUB_ENV"
          fi

      - name: Build and publish
        run: ./gradlew buildPlugin publishPlugin --stacktrace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
          draft: false
