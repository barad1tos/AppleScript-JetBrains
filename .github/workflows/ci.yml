name: CI

on:
  push:
    branches: [master, kotlin-rewrite]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build plugin
        run: ./gradlew build --stacktrace

      - name: Run tests
        run: ./gradlew test --stacktrace

      # SDEF-14: headless smoke runs ONLY on Linux to avoid bloating CI matrix.
      # The smoke verifies plugin/IDE wiring (composite parser fallback, completion,
      # WEAK_WARNING severity); per-platform compatibility is already covered by the
      # `verify` job which exercises 2024.3 / 2025.1 / 2025.2.
      - name: Run runIde headless smoke
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew runIdeHeadlessSmoke --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: build/reports/tests/

      - name: Upload smoke logs
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: build/idea-sandbox/**/log/

  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify plugin structure
        run: ./gradlew verifyPluginStructure --stacktrace

      - name: Verify plugin against target IDEs
        run: ./gradlew verifyPlugin --stacktrace

      - name: Upload verification reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verification
          path: build/reports/pluginVerifier/
