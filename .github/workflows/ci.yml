name: CI

on:
  push:
    branches: [master, kotlin-rewrite]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  gha-security:
    name: GHA security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Scan workflows for vulnerabilities
        run: uvx zizmor --min-severity medium .

  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build plugin
        run: ./gradlew build --stacktrace

      - name: Run tests with coverage
        run: ./gradlew test koverXmlReport koverVerify --stacktrace

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run runIde headless smoke
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew runIdeHeadlessSmoke --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-${{ matrix.os }}
          path: build/reports/tests/

      - name: Upload smoke logs
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-logs
          path: build/idea-sandbox/**/log/

  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Verify plugin structure
        run: ./gradlew verifyPluginStructure --stacktrace

      - name: Verify coroutines wiring
        run: ./gradlew verifyNoBundledCoroutines verifyNoRunBlocking --stacktrace

      - name: Verify static analysis
        run: ./gradlew detekt ktlintCheck --stacktrace

      - name: Verify plugin against target IDEs
        run: ./gradlew verifyPlugin --stacktrace

      - name: Verify bundled coroutines versions
        run: ./gradlew verifyBundledCoroutinesVersions --stacktrace

      - name: Fail on internal API verifier findings
        run: python3 scripts/verify-plugin-verifier.py

      - name: Upload verification reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugin-verification
          path: build/reports/pluginVerifier/
