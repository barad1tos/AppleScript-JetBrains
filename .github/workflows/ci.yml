name: CI

on:
  push:
    branches: [master, kotlin-rewrite]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build plugin
        run: ./gradlew build --stacktrace

      # Phase 7 CLEANUP-03 / D-01: the heavy fixture suite (parsing/concurrency/service/
      # codeinsight) now runs BY DEFAULT — the build.gradle.kts gate was inverted from a
      # `-PincludeHeavyTests` opt-IN to a `-PskipHeavyTests` opt-OUT. There is no flag to
      # pass here: bare `./gradlew test` is now the full heavy suite. CI Linux is the source
      # of truth for the heavy suite's green state (local macOS BasePlatformTestCase boot
      # can exceed the Gradle timeout cap; 12 drifted golden fixtures are disabled via the
      # Platform shouldRunTest() hook as Phase 8 / PARSE-07 territory).
      - name: Run tests (heavy suite by default)
        run: ./gradlew test --stacktrace

      # SDEF-14: headless smoke runs ONLY on Linux to avoid bloating CI matrix.
      # The smoke verifies plugin/IDE wiring (composite parser fallback, completion,
      # WEAK_WARNING severity); per-platform compatibility is already covered by the
      # `verify` job which exercises 2024.3 / 2025.1 / 2025.2.
      - name: Run runIde headless smoke
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew runIdeHeadlessSmoke --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: build/reports/tests/

      - name: Upload smoke logs
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: build/idea-sandbox/**/log/

  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify plugin structure
        run: ./gradlew verifyPluginStructure --stacktrace

      # COROUTINE-07: bundled-coroutines drift gate runs before the heavy
      # verifier so version drift on any verifier IDE short-circuits the job
      # at PR review time. The three tasks also run transitively via
      # `./gradlew build` in the build job, but the verify job invokes only
      # `verifyPlugin*` directly — so we wire the gate explicitly here too.
      # If this step ever fails, treat as a Platform-bundled fork drift event
      # (D-07 / 03-CONTEXT.md `<deferred>` "Phase 3 -> Post-v2.0 Backlog");
      # incident playbook is authored at first-incident time, not pre-emptively.
      - name: Verify coroutines wiring (Phase 3 drift gate)
        run: ./gradlew verifyNoBundledCoroutines verifyNoRunBlocking verifyBundledCoroutinesVersions --stacktrace

      # Phase 7 CLEANUP-04 / D-07: detekt + ktlint static-analysis gates. They run
      # transitively via `./gradlew check` in the build job, but the verify job invokes
      # only `verifyPlugin*` and the build job runs `./gradlew test` (which does NOT
      # trigger `check`). Invoking them explicitly here (mirroring the verifyNo* step
      # above) is defence-in-depth so static-analysis drift surfaces in CI. Both run
      # source-only against their grandfather baselines (detekt-baseline.xml /
      # config/ktlint/baseline.xml) — only NEW findings gate.
      - name: Verify static analysis (detekt + ktlint)
        run: ./gradlew detekt ktlintCheck --stacktrace

      - name: Verify plugin against target IDEs
        run: ./gradlew verifyPlugin --stacktrace

      - name: Upload verification reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verification
          path: build/reports/pluginVerifier/
